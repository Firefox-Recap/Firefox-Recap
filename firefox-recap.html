<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>History Viewer</title>
    <!--Chatgpt made this css for me  -->
    <style>
      body {
        font-family: sans-serif;
        margin: 0;
        padding: 0.5em;
      }
      #buttons {
        margin-bottom: 1em;
      }
      button {
        margin-right: 0.5em;
        padding: 8px 16px;
        background-color: #0060df;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #003eaa;
      }
      button:disabled {
        background-color: #cccccc;
        cursor: not-allowed;
      }
      #historyList {
        max-height: 300px;
        overflow-y: auto;
      }
      p {
        margin: 0.3em 0;
      }
      #performanceStats {
        background-color: #f0f0f0;
        padding: 10px;
        margin: 10px 0;
        border-radius: 4px;
        font-family: monospace;
      }
      .loading {
        display: none;
        margin: 10px 0;
      }
    </style>
  </head>
  <body>
    <div id="buttons">
      <button id="dayBtn">Past Day</button>
      <button id="weekBtn">Past Week</button>
      <button id="monthBtn">Past Month</button>
    </div>
    <div id="performanceStats"></div>
    <div class="loading" id="loadingIndicator">Loading history...</div>
    <div id="historyList">
    </div>

    <script src="firefox-recap.js"></script>
  </body>
</html>
